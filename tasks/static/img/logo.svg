<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220" aria-labelledby="title">
  <title id="title">Escudo Instituto Tecnológico de Ciudad Victoria</title>
  <defs>
    <style>
      .bg{fill:#4b2f2f}
      .white{fill:#ffffff}
      .light{fill:#e9e0de}
    </style>
  </defs>
  <rect x="4" y="4" width="212" height="212" rx="12" class="bg"/>
  <rect x="18" y="18" width="184" height="184" rx="6" class="white"/>
  <!-- Top ribbon -->
  <rect x="24" y="24" width="156" height="22" rx="3" class="bg"/>
  <text x="110" y="40" font-family="Georgia, serif" font-size="12" fill="#ffffff" text-anchor="middle">I. T. C. V.</text>

  <!-- Gear (left) -->
  <g transform="translate(32,54) scale(0.9)">
    <circle cx="28" cy="44" r="28" class="bg"/>
    <circle cx="28" cy="44" r="18" class="white"/>
    <g fill="#4b2f2f">
      <rect x="26" y="8" width="4" height="12" rx="1"/>
      <rect x="26" y="68" width="4" height="12" rx="1"/>
      <rect x="8" y="34" width="12" height="4" rx="1"/>
      <rect x="64" y="34" width="12" height="4" rx="1"/>
      <rect x="12" y="12" width="8" height="4" transform="rotate(-45 16 14)"/>
      <rect x="56" y="62" width="8" height="4" transform="rotate(-45 60 64)"/>
      <rect x="56" y="12" width="8" height="4" transform="rotate(45 60 14)"/>
      <rect x="12" y="62" width="8" height="4" transform="rotate(45 16 64)"/>
    </g>
  </g>

  <!-- Factory (right) -->
  <g transform="translate(95,60)">
    <rect x="0" y="34" width="72" height="68" class="bg" rx="2"/>
    <rect x="6" y="40" width="18" height="24" class="white"/>
    <rect x="28" y="28" width="14" height="36" class="light"/>
    <rect x="46" y="20" width="10" height="44" class="bg"/>
    <path d="M4 34 L20 10 L36 34 Z" fill="#f2a900" opacity="0.04"/>
  </g>

  <!-- Book + instruments bottom center -->
  <g transform="translate(70,132)">
    <rect x="0" y="18" width="80" height="28" rx="2" class="white"/>
    <path d="M8 20 L40 36 L72 20" fill="none" stroke="#4b2f2f" stroke-width="1.6"/>
    <line x1="40" y1="36" x2="40" y2="4" stroke="#4b2f2f" stroke-width="2"/>
  </g>

  <!-- Side texts -->
  <text x="24" y="120" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" transform="rotate(-90 24,120)">INSTITUTO</text>
  <text x="196" y="120" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" transform="rotate(90 196,120)">TECNOLÓGICO</text>

  <!-- Bottom label -->
  <rect x="38" y="176" width="144" height="16" rx="3" class="bg"/>
  <text x="110" y="188" font-family="Segoe UI, Roboto, Arial" font-size="10" fill="#ffffff" text-anchor="middle">CD. VICTORIA</text>
</svg>
