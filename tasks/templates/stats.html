{% extends "base.html" %}

{% block content %}

<main class="container py-5">
    <section class="card card-body">
        <h1 class="display-1 text-center">Estadísticas</h1>
        <form id="filterForm" method="get" class="row g-2 mb-3">
            <div class="col-auto">
                <label for="id_start_date">Fecha de inicio</label>
                {{ form.start_date }}
            </div>
            <div class="col-auto">
                <label for="id_end_date">Fecha de fin</label>
                {{ form.end_date }}
            </div>
            <div class="col-auto align-self-end">
                <button type="submit" class="btn btn-primary">Filtrar</button>
                <button type="button" id="clearBtn" class="btn btn-secondary">Limpiar</button>
            </div>
        </form>

        <p>Tareas completadas: {{ completed_tasks }}</p>
        <p>Tareas pendientes: {{ pending_tasks }}</p>

        <p>Porcentaje de tareas completadas: {{ completion_percentage }}%</p>

        <div class="mt-4">
            <canvas id="completedChart" width="400" height="200"></canvas>
        </div>

        <!-- Modal para mostrar tareas por barra -->
        <div class="modal fade" id="tasksModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Tareas</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body" id="tasksModalBody">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            const ctx = document.getElementById('completedChart').getContext('2d');
            let completedChart = null;

            function buildUrlWithParams() {
                const params = new URLSearchParams();
                const start = document.getElementById('id_start_date').value;
                const end = document.getElementById('id_end_date').value;
                if (start) params.append('start_date', start);
                if (end) params.append('end_date', end);
                return `/stats/data/?${params.toString()}`;
            }

            async function fetchDataAndRender() {
                const url = buildUrlWithParams();
                const res = await fetch(url);
                if (!res.ok) return;
                const json = await res.json();
                const labels = json.labels || [];
                const completed = json.completed_data || [];
                const created = json.created_pending_data || [];
                const scheduled = json.scheduled_data || [];

                const completedTitles = json.completed_titles || [];
                const createdTitles = json.created_titles || [];
                const scheduledTitles = json.scheduled_titles || [];

                const completedItems = json.completed_items || [];
                const createdItems = json.created_items || [];
                const scheduledItems = json.scheduled_items || [];

                // Store titles and items for tooltip and modal access
                window.statTitles = { completed: completedTitles, created: createdTitles, scheduled: scheduledTitles };
                window.statItems = { completed: completedItems, created: createdItems, scheduled: scheduledItems };

                const config = {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Completadas',
                                data: completed,
                                backgroundColor: 'rgba(75, 192, 192, 0.7)'
                            },
                            {
                                label: 'Pendientes (creadas)',
                                data: created,
                                backgroundColor: 'rgba(255, 159, 64, 0.8)'
                            },
                            {
                                label: 'Programadas',
                                data: scheduled,
                                backgroundColor: 'rgba(255, 99, 132, 0.7)'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const dsIndex = context.datasetIndex;
                                        const idx = context.dataIndex;
                                        const value = context.parsed.y;
                                        let titles = [];
                                        if (dsIndex === 0) titles = window.statTitles.completed[idx] || [];
                                        else if (dsIndex === 1) titles = window.statTitles.created[idx] || [];
                                        else if (dsIndex === 2) titles = window.statTitles.scheduled[idx] || [];

                                        const lines = [];
                                        lines.push(context.dataset.label + ': ' + value);
                                        if (titles.length) {
                                            lines.push('Tareas:');
                                            titles.slice(0, 8).forEach(t => lines.push('- ' + t));
                                            if (titles.length > 8) lines.push('...');
                                        }
                                        return lines;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { display: true },
                            y: { display: true, beginAtZero: true }
                        }
                    }
                };

                if (completedChart) {
                    completedChart.data.labels = labels;
                    completedChart.data.datasets[0].data = completed;
                    completedChart.data.datasets[1].data = created;
                    completedChart.data.datasets[2].data = scheduled;
                    completedChart.update();
                } else {
                    completedChart = new Chart(ctx, config);
                }
                // Añadir manejador de clics para abrir modal con la lista de tareas
                const canvas = document.getElementById('completedChart');
                canvas.onclick = function(evt) {
                    if (!completedChart) return;
                    const points = completedChart.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, true);
                    if (!points.length) return;
                    const p = points[0];
                    const ds = p.datasetIndex;
                    const idx = p.index;
                    let items = [];
                    if (ds === 0) items = window.statItems.completed[idx] || [];
                    else if (ds === 1) items = window.statItems.created[idx] || [];
                    else if (ds === 2) items = window.statItems.scheduled[idx] || [];

                    let html = '';
                    if (!items.length) {
                        html = '<p>No hay tareas para esta barra.</p>';
                    } else {
                        html = '<ul class="list-group">';
                        items.forEach(it => {
                            const url = `/tasks/${it.id}/`;
                            let badge = '<span class="badge bg-secondary ms-2">Pendiente</span>';
                            if (it.datecompleted) badge = '<span class="badge bg-success ms-2">Completada</span>';
                            else if (it.scheduled_date) badge = '<span class="badge bg-warning ms-2">Programada</span>';
                            html += `<li class="list-group-item"><a href="${url}">${it.title}</a> ${badge}`;
                            if (it.created_at) html += ` <small class="text-muted ms-2">(${it.created_at.split('T')[0]})</small>`;
                            html += '</li>';
                        });
                        html += '</ul>';
                    }

                    document.getElementById('tasksModalBody').innerHTML = html;
                    const modal = new bootstrap.Modal(document.getElementById('tasksModal'));
                    modal.show();
                };
            }

            document.getElementById('filterForm').addEventListener('submit', function(e) {
                e.preventDefault();
                fetchDataAndRender();
            });

            document.getElementById('clearBtn').addEventListener('click', function() {
                document.getElementById('id_start_date').value = '';
                document.getElementById('id_end_date').value = '';
                fetchDataAndRender();
            });

            document.addEventListener('DOMContentLoaded', fetchDataAndRender);
        </script>
    </section>
</main>

{% endblock %}
